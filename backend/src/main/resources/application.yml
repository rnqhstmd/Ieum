server:
  port: 8080
  servlet:
    session:
      timeout: 7d
      cookie:
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  application:
    name: ieum-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ieum}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${INVITE_FROM_EMAIL:Ieum <noreply@ieum.app>}
  invitation:
    expiry-cron: ${INVITATION_EXPIRY_CRON:0 0 2 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
