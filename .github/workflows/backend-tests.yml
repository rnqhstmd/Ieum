name: Backend Tests

# PR(→ main)마다 백엔드 전체 테스트(JUnit + Testcontainers)를 실행하고
# 결과를 PR에 코멘트 + 체크로 보고한다.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # 결과 코멘트 작성
  checks: write          # 체크 런 생성

jobs:
  test:
    name: Gradle test (Testcontainers)
    runs-on: ubuntu-latest   # Docker 내장 → Testcontainers PostgreSQL 동작
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test --no-daemon --console=plain

      - name: Publish test results (PR comment + check)
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Backend Test Results
          comment_title: Backend Test Results
          files: |
            backend/build/test-results/**/*.xml

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: |
            backend/build/reports/tests/test
            backend/build/test-results/test
          if-no-files-found: ignore
